name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build & analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang-tidy cppcheck make

      - name: Configure
        run: |
          cmake -S . -B build \
            -DENABLE_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_C_FLAGS="--coverage"

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
          # gcov 리포트 생성 (분석기가 읽을 수 있도록)
          cd build
          find . -name "*.gcno" -exec gcov {} +

      - name: Static Analysis - cppcheck
        run: |
          cppcheck --enable=all --inconclusive --std=c++17 \
            --error-exitcode=0 --suppress=missingIncludeSystem \
            -I src src

      - name: Static Analysis - clang-tidy
        run: |
          find src -name '*.cpp' -print0 | xargs -0 -n 1 clang-tidy -p build

      - name: Debug compile_commands
        run: |
          python3 - << 'PY'
          import json, os
          path = 'build/compile_commands.json'
          if os.path.exists(path):
              d = json.load(open(path))
              print(f"Total entries: {len(d)}")
          else:
              print("File not found!")
          PY

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
            -Dsonar.cfamily.gcov.reportsPath=build