name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build & analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang-tidy cppcheck curl unzip

      - name: Configure
        run: cmake -S . -B build -G Ninja -DENABLE_TESTS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
      - name: Build (with Sonar build-wrapper)
        run: |
          curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -q build-wrapper.zip -d .
          ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 --out-dir bw-output cmake --build build

      - name: Debug bw-output
        run: |
          ls -al
          ls -al bw-output || true

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Static Analysis - cppcheck
        run: |
          cppcheck \
            --enable=all --inconclusive --std=c++17 \
            --error-exitcode=0 \
            --suppress=missingIncludeSystem \
            -I src \
            src

      - name: Static Analysis - clang-tidy
        run: |
          find src -name '*.cpp' -print0 | xargs -0 -n 1 clang-tidy -p build
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}