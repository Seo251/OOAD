name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build & analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang-tidy cppcheck make
        
          # [УпАЁ] 1. SonarCloud РќПы Build Wrapper МГФЁ
      - name: Install Build Wrapper
        run: |
          curl -sSLo build-wrapper-linux-x86-64.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86-64.zip
          unzip -o build-wrapper-linux-x86-64.zip

      - name: Configure
        run: cmake -S . -B build -DENABLE_TESTS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=/usr/bin/gcc -DCMAKE_CXX_COMPILER=/usr/bin/g++ -DCMAKE_C_COMPILER_LAUNCHER= -DCMAKE_CXX_COMPILER_LAUNCHER= -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
            
        # [МіСЄ] 2. Build ИэЗЩОюИІ Build WrapperЗЮ АЈНЮБт
      - name: Build with Build Wrapper
        run: |
          ./build-wrapper-linux-x86-64/build-wrapper-linux-x86-64 --out-dir bw-output cmake --build build
      
          
     #- name: Build
     #   run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Static Analysis - cppcheck
        run: |
          cppcheck \
            --enable=all --inconclusive --std=c++17 \
            --error-exitcode=0 \
            --suppress=missingIncludeSystem \
            -I src \
            src

      - name: Static Analysis - clang-tidy
        run: |
          find src -name '*.cpp' -print0 | xargs -0 -n 1 clang-tidy -p build
      - name: Debug compile_commands first entry
        run: |
          python3 - << 'PY'
          import json
          d=json.load(open('build/compile_commands.json'))
          print("entries:", len(d))
          e=d[0]
          print("file:", e.get("file"))
          print("directory:", e.get("directory"))
          print("command:", (e.get("command","")[:400]))
          PY

      # [МіСЄ] 3. SonarCloud КаМЎ НЧЧр (bw-output АцЗЮ СіСЄ)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.build-wrapper-output=bw-output