name: CI

on:
  push:
    branches: [ "main", "develop", "feature/*", "Sun", "bug_fix" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 #소나클라우드 분석위한 깃 히스토리 가져오기

      - name: Install build & analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          sudo apt-get install -y cmake g++ clang-tidy cppcheck make lcov python3-pygments gcovr

      - name: Configure
        run: |
          cmake -S . -B build \
          -DENABLE_TESTS=ON \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_FLAGS="--coverage" \
          -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
          -DCMAKE_C_COMPILER=/usr/bin/gcc \
          -DCMAKE_CXX_COMPILER=/usr/bin/g++ \
          -DCMAKE_C_COMPILER_LAUNCHER= \
          -DCMAKE_CXX_COMPILER_LAUNCHER= \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
            

      - name: Build
        run: cmake --build build

      - name: Test and Coverage
        run: |
          # 1. 테스트 실행
          ctest --test-dir build --output-on-failure

          # 2. 데이터 수집 (build 폴더와 현재 폴더 모두 탐색)
          lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch

          # 3. 불필요한 파일 제거 (경로를 더 단순하게 잡았습니다)
          lcov --remove coverage.info \
            '/usr/*' \
            '*/tests/* ' \
            '*/_deps/*' \
            '*/build/*' \
            --output-file coverage.info \
            --ignore-errors mismatch,unused

          
          # 6. HTML 리포트 생성
          genhtml coverage.info -o coverage_html

          # 7. [추가] SonarCloud용 커버리지 XML 생성
          # lcov와 별개로 gcovr를 사용해 SonarQube 전용 포맷으로 뽑아냅니다.
          gcovr --sonarqube coverage.xml --filter src/


      - name: Static Analysis - cppcheck
        run: |
          mkdir -p reports

          set +e
          cppcheck \
            --project=build/compile_commands.json \
            --file-filter=src/* \
            --file-filter=tests/* \
            --enable=warning,style,performance,portability \
            --std=c++17 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            --xml --xml-version=2 \
            2> reports/cppcheck.xml
          echo "CPPCHECK_EXIT_CODE=$?" >> $GITHUB_ENV
          exit 0

      - name: Generate cppcheck HTML report
        if: always()
        run: |
          mkdir -p cppcheck_html
          cppcheck-htmlreport \
            --file=reports/cppcheck.xml \
            --report-dir=cppcheck_html \
            --source-dir=.

      - name: Prepare GitHub Pages site
        if: always()
        run: |
          mkdir -p pages/coverage pages/cppcheck
          cp -r coverage_html/. pages/coverage/
          cp -r cppcheck_html/. pages/cppcheck/
          cat > pages/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>CI Reports</title>
          </head>
          <body>
            <h1>CI Reports</h1>
            <ul>
              <li><a href="./coverage/index.html">Coverage Report</a></li>
              <li><a href="./cppcheck/index.html">Cppcheck Report</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Fail if cppcheck found issues
        if: always()
        run: |
          test "${CPPCHECK_EXIT_CODE}" = "0"

      - name: Deploy reports to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: pages # 배포할 HTML 리포트 폴더
          branch: gh-pages

      - name: Static Analysis - clang-tidy
        run: |
          run-clang-tidy -p build -header-filter='src/.*' > clang-tidy-report.txt || true
      
      
      - name: Debug compile_commands first entry
        run: |
          python3 - << 'PY'
          import json
          d=json.load(open('build/compile_commands.json'))
          print("entries:", len(d))
          e=d[0]
          print("file:", e.get("file"))
          print("directory:", e.get("directory"))
          print("command:", (e.get("command","")[:400]))
          PY

      #경로변경 삭제

       #소나클라우드 방식 변경: 도커 -> 러너에 sonar scanner 직접 설치   
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
             -X
             -Dsonar.scm.disabled=true
             -Dsonar.verbose=true
        #-X is optional.
      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        if: always() # 빌드 성공/실패 상관없이 무조건 알림 전송
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "CI/CD 리포트: ${{ github.repository }}"
          description: |
            상태: ${{ job.status == 'success' && '✅ 성공' || '❌ 실패' }}
            브랜치: `${{ github.ref_name }}`
            작성자: ${{ github.actor }}
            
            커버리지 리포트 확인하기: 
            [https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/]
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
          username: "GitHub CI Bot"