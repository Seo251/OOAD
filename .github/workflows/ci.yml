name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build & analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang-tidy cppcheck make
          sudo apt-get install -y gcc-11 g++-11
          # 시스템 기본 컴파일러를 g++-11로 고정
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=/usr/bin/gcc \
            -DCMAKE_CXX_COMPILER=/usr/bin/g++ \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DENABLE_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_C_FLAGS="--coverage"

      - name: Build
        run: cmake --build build

      - name: Test
        run: |
          ctest --test-dir build --output-on-failure
          # gcov
          cd build
          find . -name "*.gcno" -exec gcov {} +

      - name: Static Analysis - cppcheck
        run: |
          cppcheck --enable=all --inconclusive --std=c++17 \
            --error-exitcode=0 --suppress=missingIncludeSystem \
            -I src src

      - name: Static Analysis - clang-tidy
        run: |
          find src -name '*.cpp' -print0 | xargs -0 -n 1 clang-tidy -p build

      - name: Debug compile_commands
        run: |
          python3 - << 'PY'
          import json, os
          path = 'build/compile_commands.json'
          if os.path.exists(path):
              d = json.load(open(path))
              print(f"Total entries: {len(d)}")
          else:
              print("File not found!")
          PY

      - name: Fix paths in compile_commands.json
        run: |
          # 1. 절대 경로를 상대 경로로 치환
          sed -i "s|$(pwd)/||g" build/compile_commands.json
          # 2. 컴파일러 경로를 SonarCloud가 인식하기 쉬운 이름으로 강제 치환
          sed -i 's|/usr/bin/c++|g++|g' build/compile_commands.json
          sed -i 's|/usr/bin/cc|gcc|g' build/compile_commands.json

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
            -Dsonar.cfamily.gcov.reportsPath=build
            -Dsonar.projectBaseDir=.