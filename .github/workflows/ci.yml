name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build & analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang-tidy cppcheck make
          sudo apt-get install -y gcc-11 g++-11
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100

      - name: Install SonarCloud Build Wrapper
        run: |
          mkdir -p $HOME/.sonar
          curl -sSLo $HOME/.sonar/build-wrapper-linux-x86.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -o $HOME/.sonar/build-wrapper-linux-x86.zip -d $HOME/.sonar/
          # 바이너리가 들어있는 정확한 디렉토리를 PATH에 추가
          echo "$HOME/.sonar/build-wrapper-linux-x86" >> $GITHUB_PATH

      - name: Configure
        run: |
          cmake -S . -B build -DENABLE_TESTS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build with Build Wrapper
        run: |
          # build-wrapper 실행 (환경 기록)
          build-wrapper-linux-x86-64 --out-dir bw-output cmake --build build

      - name: Test and Coverage
        run: |
          ctest --test-dir build --output-on-failure
          cd build && find . -name "*.gcno" -exec gcov {} +

      - name: Static Analysis - cppcheck
        run: |
          cppcheck --enable=all --inconclusive --std=c++17 \
            --error-exitcode=0 --suppress=missingIncludeSystem \
            -I src src

      - name: Static Analysis - clang-tidy
        run: |
          find src -name '*.cpp' -print0 | xargs -0 -n 1 clang-tidy -p build

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.build-wrapper-output=bw-output
            -Dsonar.cfamily.gcov.reportsPath=build
            # 여기에 compile-commands 관련 설정이 있다면 삭제!