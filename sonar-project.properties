# 1. 프로젝트 키 확인 (소나클라우드 사이트 'Project Information'에 있는 값과 똑같아야 함)
sonar.projectKey=Seo251_OOAD
sonar.organization=seo251

# 2. 소스 및 테스트 경로
sonar.sources=src
sonar.tests=tests

# 3. 분석 결과 경로 (YAML 생성 위치와 100% 일치시킴)
sonar.cfamily.compile-commands=build/compile_commands.json

# [중요] YAML에서 2> reports/cppcheck.xml 로 만들었으므로 경로를 맞춤
sonar.cppcheck.reportPath=reports/cppcheck.xml

# clang-tidy는 루트에 생성되므로 그대로 유지
sonar.clangtidy.reportPath=clang-tidy-report.txt

# 커버리지 파일 lcov 방식 유지
sonar.cpp.lcov.reportPath=coverage.info